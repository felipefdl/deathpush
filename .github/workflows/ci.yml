name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust checks
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./crates -> target"

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Tests
        run: cargo test --workspace

  xcode:
    name: Xcode build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./crates -> target"

      - name: Resolve Xcode packages
        run: xcodebuild -resolvePackageDependencies -project DeathPush/DeathPush.xcodeproj

      - name: Build
        run: |
          xcodebuild build \
            -project DeathPush/DeathPush.xcodeproj \
            -scheme DeathPush \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO
