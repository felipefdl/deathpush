name: Publish Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Import Apple Developer Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./crates -> target"

      - name: Resolve Xcode packages
        run: xcodebuild -resolvePackageDependencies -project DeathPush/DeathPush.xcodeproj

      - name: Build archive
        run: |
          xcodebuild archive \
            -project DeathPush/DeathPush.xcodeproj \
            -scheme DeathPush \
            -configuration Release \
            -archivePath DeathPush/build/DeathPush.xcarchive \
            CODE_SIGN_IDENTITY="${{ secrets.APPLE_SIGNING_IDENTITY }}" \
            CODE_SIGN_STYLE=Manual

      - name: Export app from archive
        run: |
          cat > /tmp/export-options.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>${{ secrets.APPLE_SIGNING_IDENTITY }}</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath DeathPush/build/DeathPush.xcarchive \
            -exportPath DeathPush/build \
            -exportOptionsPlist /tmp/export-options.plist

      - name: Create DMG
        run: |
          brew install create-dmg
          DeathPush/scripts/create-dmg.sh

      - name: Sign DMG
        run: |
          codesign --force --sign "${{ secrets.APPLE_SIGNING_IDENTITY }}" \
            --options runtime \
            DeathPush/build/DeathPush.dmg

      - name: Write Apple API key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.APPLE_API_KEY_CONTENT }}" > ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8

      - name: Notarize DMG
        run: |
          xcrun notarytool submit DeathPush/build/DeathPush.dmg \
            --key ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8 \
            --key-id "${{ secrets.APPLE_API_KEY }}" \
            --issuer "${{ secrets.APPLE_API_ISSUER }}" \
            --wait

          xcrun stapler staple DeathPush/build/DeathPush.dmg

      - name: Sparkle sign and generate appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          SPARKLE_BIN=$(find ~/Library/Developer/Xcode/DerivedData -path "*/artifacts/sparkle/Sparkle/bin" -type d | head -1)

          echo "$SPARKLE_PRIVATE_KEY" | "$SPARKLE_BIN/sign_update" --ed-key-file - DeathPush/build/DeathPush.dmg

          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/"
          echo "$SPARKLE_PRIVATE_KEY" | "$SPARKLE_BIN/generate_appcast" \
            --ed-key-file - \
            --download-url-prefix "$DOWNLOAD_URL" \
            DeathPush/build

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "DeathPush v${VERSION}" \
            --draft \
            --generate-notes \
            DeathPush/build/DeathPush.dmg \
            DeathPush/build/appcast.xml
